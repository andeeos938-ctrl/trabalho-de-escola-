<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mixer Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-mobile">
        <header class="header">
            <div class="brand">PRO-MIXER <span>X30</span></div>
            <div id="bt-dot" class="bt-dot"></div>
        </header>

        <main class="viewport">
            
            <section id="connect" class="tab-content active">
                <div class="mobile-card">
                    <span class="material-symbols-outlined large-icon">bluetooth</span>
                    <h2>Conectividade</h2>
                    <p id="status-text">Dispositivo pronto para busca</p>
                    <button class="btn-action" onclick="simulateConnect()">ESCANEAR</button>
                </div>
            </section>

            <section id="mixer" class="tab-content">
                <div class="mixer-container" id="mixer-render">
                    </div>
            </section>

            <section id="effects" class="tab-content">
                <div class="fx-mobile-grid" id="fx-render">
                    </div>
            </section>

            <section id="setup" class="tab-content">
                <div class="setup-container">
                    <h3>Memória do Sistema</h3>
                    <div class="setup-row">
                        <button class="btn-setup" onclick="savePreset()">SALVAR ATUAL</button>
                        <button class="btn-setup" onclick="loadPreset()">CARREGAR</button>
                    </div>
                    <button class="btn-reset" onclick="window.location.reload()">REINICIAR INTERFACE</button>
                </div>
            </section>

        </main>

        <nav class="nav-bar">
            <button class="nav-btn active" onclick="changeTab('connect', this)">
                <span class="material-symbols-outlined">sensors</span>
                <label>Link</label>
            </button>
            <button class="nav-btn" onclick="changeTab('mixer', this)">
                <span class="material-symbols-outlined">equalizer</span>
                <label>Mixer</label>
            </button>
            <button class="nav-btn" onclick="changeTab('effects', this)">
                <span class="material-symbols-outlined">grid_view</span>
                <label>FX</label>
            </button>
            <button class="nav-btn" onclick="changeTab('setup', this)">
                <span class="material-symbols-outlined">tune</span>
                <label>Config</label>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
